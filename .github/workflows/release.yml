name: Release Suite

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: pi-suite-release-main
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      release_commit: ${{ steps.commit.outputs.release_commit || steps.pull-request.outputs.release_commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2
      - id: commit
        if: github.event_name == 'push'
        run: node tooling/release/classify.mjs "${{ github.sha }}"
      - id: pull-request
        if: github.event_name == 'pull_request'
        run: echo "release_commit=false" >> "$GITHUB_OUTPUT"

  candidate:
    needs: classify
    if: needs.classify.outputs.release_commit == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      mode: ${{ steps.prepare.outputs.mode }}
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: prepare
        if: github.event_name == 'push'
        run: node tooling/release/prepare.mjs "${{ github.sha }}"
      - run: pnpm verify
      - name: Verify a real Chrome connector
        run: pnpm --filter @yansircc/pi-chrome run release:check
      - name: Build each immutable archive once
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node tooling/release/build-candidates.mjs
          elif [ "${{ steps.prepare.outputs.mode }}" = "existing" ]; then
            node tooling/release/build-candidates.mjs --existing-release "${{ github.sha }}"
          else
            node tooling/release/build-candidates.mjs --prepared-source "${{ github.sha }}"
          fi
      - run: pnpm verify:candidates
      - run: pnpm verify:consumers
      - uses: actions/upload-artifact@v4
        with:
          name: suite-candidates
          path: |
            release/candidate.json
            release/candidates/*.tgz
          if-no-files-found: error
          retention-days: 14

  platform-witness:
    needs: candidate
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: suite-candidates
          path: release
      - run: pnpm verify:platform

  publish:
    needs: [candidate, platform-witness]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Require npm Trusted Publishing support
        shell: bash
        run: |
          npm --version
          node -e "const {execFileSync}=require('node:child_process');const [major,minor]=execFileSync('npm',['--version'],{encoding:'utf8'}).trim().split('.').map(Number);if(major<11||(major===11&&minor<5))throw new Error('npm 11.5.1 or newer is required for OIDC')"
      - uses: actions/download-artifact@v4
        with:
          name: suite-candidates
          path: release
      - id: prepare
        run: node tooling/release/prepare.mjs "${{ github.sha }}"
      - name: Bind verified archives to prepared version
        run: |
          node -e "const fs=require('node:fs');const p=require('./package.json');const c=require('./release/candidate.json');if(p.version!==c.projection.version)throw new Error('prepared version differs from verified candidate')"
          pnpm verify:candidates
      - name: Create the release commit and tag
        if: steps.prepare.outputs.mode == 'new'
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json apps/web/package.json extensions/loop/package.json extensions/weixin/package.json extensions/chrome/package.json
          git commit -m "chore(release): ${{ steps.prepare.outputs.tag }}" -m "Release-Source: ${{ github.sha }}" -m "Release-Bump: ${{ steps.prepare.outputs.bump }}"
          git tag "${{ steps.prepare.outputs.tag }}"
          git push --atomic origin HEAD:main "refs/tags/${{ steps.prepare.outputs.tag }}"
      - run: pnpm publish:candidates

  public-acceptance:
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: suite-candidates
          path: release
      - run: pnpm verify:registry
