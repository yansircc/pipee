name: Site

on:
  pull_request:
    paths:
      - apps/site/**
      - apps/pipee/package.json
      - extensions/*/package.json
      - tooling/site/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/site.yml
  push:
    branches: [main]
    paths:
      - apps/site/**
      - apps/pipee/package.json
      - extensions/*/package.json
      - tooling/site/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/site.yml
  workflow_dispatch:

concurrency:
  group: pipee-site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pipee/site verify

  deploy:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: verify
    runs-on: ubuntu-latest
    environment: site-production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Require the exact Pipee package to be public
        run: node tooling/site/verify-public-package.mjs
      - run: pnpm --filter @pipee/site build
      - run: pnpm --filter @pipee/site run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
