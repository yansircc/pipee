<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pi Chrome Connector</title>
    <link rel="stylesheet" href="{{extension-asset:popupStyles}}" />
  </head>
  <body>
    <main>
      <h1>Pi Chrome Connector</h1>
      <p id="identity" class="muted"></p>
      <label>
        Profile label
        <input id="label" maxlength="80" autocomplete="off" />
      </label>
      <section id="challenge-panel">
        <label>
          One-time pairing token from Pi
          <input
            id="challenge"
            maxlength="32"
            autocomplete="off"
            inputmode="text"
            spellcheck="false"
          />
        </label>
      </section>
      <p id="message" role="status"></p>
      <button id="confirm" type="button" disabled>Pair this Chrome profile</button>
    </main>
    <script src="{{extension-asset:popupScript}}"></script>
  </body>
</html>
