packages:
  - "apps/*"
  - "extensions/*"
  - "packages/*"
  - "protocols/*"

catalog:
  "@earendil-works/pi-agent-core": &pi-release 0.80.10
  "@earendil-works/pi-ai": *pi-release
  "@earendil-works/pi-coding-agent": *pi-release
  "@earendil-works/pi-tui": *pi-release
  "@effect/platform-browser": 4.0.0-beta.98
  "@effect/platform-node": 4.0.0-beta.98
  "@effect/opentelemetry": 4.0.0-beta.98
  "@effect/tsgo": 0.21.0
  "@effect/vitest": 4.0.0-beta.98
  "@types/cross-spawn": 6.0.6
  "@yansircc/effect-scan": 0.1.3
  effect: 4.0.0-beta.98
  jiti: 2.7.0
  typescript: 7.0.2
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vite-plus: 0.2.4
  vitest: 4.1.10

overrides:
  "@earendil-works/pi-agent-core": "catalog:"
  "@earendil-works/pi-ai": "catalog:"
  "@earendil-works/pi-coding-agent": "catalog:"
  "@earendil-works/pi-tui": "catalog:"
  vite: "catalog:"
  vitest: "catalog:"

patchedDependencies:
  "@tanstack/react-router@1.170.18": apps/pipee/patches/@tanstack__react-router@1.170.18.patch

peerDependencyRules:
  allowedVersions:
    vite: 0.2.4

allowBuilds:
  "@google/genai": false
  esbuild: false
  msgpackr-extract: false
  protobufjs: false

minimumReleaseAgeExclude:
  - "@yansircc/effect-scan"
